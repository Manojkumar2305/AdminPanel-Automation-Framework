# Browser: chrome or firefox
browser=chrome

# EvilTester base URL
base.url=https://testpages.eviltester.com

# Page-specific paths (no hardcoded URLs in test classes)
form.url=/styled/basic-html-form-test.html
table.sort.url=/styled/tag/table.html
table.paged.url=/styled/paged-table-test.html
alert.url=/styled/alerts/alert-test.html
dynamic.url=/styled/dynamic/dynamic-fields-test.html
redirect.url=/styled/redirects-test.html
frame.url=/styled/iframes/iframes-test.html

# Explicit wait timeout in seconds
timeout=15

# Headless mode: true or false
headless=false

# Output paths
screenshots.path=screenshots/
report.path=test-output/AdminPanelReport.html
